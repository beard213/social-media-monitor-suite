services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://monitor:monitor@db:5432/monitor
    ports:
      - "18101:18101"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python scripts/bootstrap.py && uvicorn app.main:app --host 0.0.0.0 --port 18101"

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://monitor:monitor@db:5432/monitor
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.worker

volumes:
  postgres_data:
